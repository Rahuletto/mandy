name: Build

# Publishes draft GitHub releases with bundles + signed updater artifacts (`latest.json`).
# Add repo secrets: TAURI_SIGNING_PRIVATE_KEY (full key file contents) and optionally
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD. The public key in src-tauri/tauri.conf.json must
# match the private key used in CI.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: v__VERSION__
          releaseName: Mandy v__VERSION__
          releaseDraft: true
          releaseBody: |
            ## macOS: "Mandy is damaged and can't be opened"

            These builds are not signed with an Apple Developer ID, so Gatekeeper may refuse to open the app.

            After copying **Mandy.app** to Applications, run:

            ```sh
            xattr -cr /Applications/Mandy.app
            ```

            Then open Mandy again. In-app updates use Tauri's update signatures; they do not replace Apple code signing or notarization.

            ## Downloads

            Use the **.dmg** (macOS), **.msi** / **.exe** (Windows), or **.deb** / **.AppImage** (Linux). The in-app updater reads **latest.json** from this release.
          args: ${{ matrix.args }}
